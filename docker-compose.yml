# ============================================================
#  VidyaMitra — docker-compose.yml
#  Runs: Backend API + MongoDB + Mongo Express (DB GUI)
# ============================================================

version: "3.9"

services:

  # ── Node.js / Express Backend ──────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vidyamitra-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/vidyamitra
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_in_production}
      JWT_EXPIRES_IN: 7d
      CLIENT_URL: http://localhost:3000
    volumes:
      - ./backend:/app
      - /app/node_modules              # prevent host node_modules override
      - resume_uploads:/app/uploads
    depends_on:
      - mongo
    networks:
      - vidyamitra-net

  # ── MongoDB ────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: vidyamitra-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: vidyamitra
    volumes:
      - mongo_data:/data/db
    networks:
      - vidyamitra-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Mongo Express (DB GUI at localhost:8081) ───────────────
  mongo-express:
    image: mongo-express:latest
    container_name: vidyamitra-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongo:27017/
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      - mongo
    networks:
      - vidyamitra-net

# ── Volumes ────────────────────────────────────────────────────
volumes:
  mongo_data:
  resume_uploads:

# ── Networks ───────────────────────────────────────────────────
networks:
  vidyamitra-net:
    driver: bridge
